<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 접근성 모니터링 보고서 생성기 v6</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --navy: #1b3a6b;
      --navy-light: #2a5298;
      --accent: #2563eb;
      --P: #3b82f6;
      --K: #10b981;
      --S: #f59e0b;
      --I: #8b5cf6;
      --T: #06b6d4;
      --good: #22c55e;
      --partial: #f59e0b;
      --bad: #ef4444;
      --na: #94a3b8;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --line: #d8e1ee;
      --shadow: 0 2px 12px rgba(27,58,107,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-header {
      background: var(--navy);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .app-header .logo {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .app-header .sub {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .app-header .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .apikey-panel {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      border-left: 4px solid #4285f4;
      flex-wrap: wrap;
    }

    .apikey-panel label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--navy);
      white-space: nowrap;
    }

    .apikey-panel input {
      flex: 1;
      min-width: 240px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-family: monospace;
      background: #f8fafc;
    }

    .apikey-panel button {
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .apikey-panel button:hover { background: #3367d6; }
    .apikey-status { font-size: 0.8rem; white-space: nowrap; }
    .apikey-status.set { color: var(--good); }
    .apikey-status.unset { color: var(--bad); }

    #phase-upload { display: block; }
    #phase-parsed, #phase-report { display: none; }

    .upload-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      padding: 52px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .upload-card:hover,
    .upload-card.drag-over {
      border-color: var(--accent);
      background: #f0f7ff;
    }

    .upload-icon svg {
      width: 56px;
      height: 56px;
      color: var(--accent);
      margin: 0 auto 16px;
      display: block;
    }

    .upload-card h2 {
      font-size: 1.2rem;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .upload-card p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .hint {
      margin-top: 16px;
      background: #f1f5f9;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    #file-input { display: none; }

    .status-bar {
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.88rem;
      color: #166534;
      margin-bottom: 16px;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .back-btn,
    .toolbar-btn.outline {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.84rem;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Noto Sans KR', sans-serif;
    }

    .back-btn:hover,
    .toolbar-btn.outline:hover {
      background: #f8fafc;
    }

    .phase-header h2 {
      font-size: 1.1rem;
      color: var(--navy);
    }

    .select-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .fac-tab {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.15s;
    }

    .fac-tab:hover { border-color: var(--accent); }
    .fac-tab.active {
      border-color: var(--accent);
      background: #eff6ff;
      color: var(--accent);
      font-weight: 600;
    }

    .facility-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media(max-width:700px) {
      .facility-grid { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: 1fr; }
    }

    .info-card,
    .score-card,
    .daily-card,
    .checklist-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .domain-scores {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 8px;
    }

    .domain-score {
      text-align: center;
      padding: 12px 6px;
      border-radius: 8px;
      background: #f8fafc;
    }

    .domain-score .d-code { font-size: 1.1rem; font-weight: 700; }
    .domain-score .d-pct { font-size: 1.3rem; font-weight: 700; margin: 2px 0; }
    .domain-score .d-grade,
    .d-grade {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
    }

    .grade-A { background:#dcfce7; color:#166534; }
    .grade-B { background:#dbeafe; color:#1e40af; }
    .grade-C { background:#fef9c3; color:#854d0e; }
    .grade-D { background:#ffedd5; color:#9a3412; }
    .grade-E { background:#fee2e2; color:#991b1b; }

    .radar-wrap { height: 240px; margin-top: 12px; }
    .cl-section { margin-bottom: 14px; }
    .cl-section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    .cl-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.82rem;
      flex-wrap: wrap;
    }

    .cl-code { font-weight: 700; color: var(--navy); min-width: 40px; }
    .cl-q { flex: 1; color: var(--text); min-width: 180px; }
    .cl-ans { font-weight: 600; min-width: 56px; text-align: right; font-size: 0.8rem; }
    .val-적정 { color: var(--good); }
    .val-인적지원 { color: var(--accent); }
    .val-부적절, .val-미설치, .val-미지원, .val-미제공 { color: var(--bad); }
    .val-해당없음 { color: var(--na); }
    .cl-reason {
      font-size: 0.76rem;
      color: var(--muted);
      flex-basis: 100%;
      padding-left: 48px;
      margin-top: 2px;
    }

    .daily-entry {
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.83rem;
    }

    .daily-entry:last-child { border-bottom: none; }
    .daily-entry .d-num { font-weight: 700; color: var(--navy); font-size: 0.76rem; }
    .daily-entry .d-fact { color: var(--text); margin: 3px 0; }
    .daily-entry .d-exp { color: #7c3aed; font-style: italic; margin: 2px 0; }
    .daily-entry .d-ins { color: #0284c7; margin: 2px 0; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .meta-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-field input,
    .meta-field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .meta-field input:focus,
    .meta-field select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .gen-btn,
    .toolbar-btn.primary {
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .gen-btn {
      width: 100%;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .gen-btn:hover:not(:disabled),
    .toolbar-btn.primary:hover {
      background: var(--navy-light);
    }

    .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .report-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .report-title-bar {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
      margin-left: auto;
    }

    .report-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      font-size: 0.9rem;
      line-height: 1.8;
      min-height: 300px;
    }

    .report-content h1 {
      font-size: 1.3rem;
      color: var(--navy);
      border-bottom: 2px solid var(--navy);
      padding-bottom: 8px;
      margin: 20px 0 12px;
      font-family: 'Noto Serif KR', serif;
    }

    .report-content h2 {
      font-size: 1.1rem;
      color: var(--navy-light);
      margin: 16px 0 8px;
    }

    .report-content h3 {
      font-size: 0.95rem;
      color: var(--navy);
      margin: 12px 0 6px;
    }

    .report-content p { margin-bottom: 8px; }
    .report-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85rem; }
    .report-content th { background: #f1f5f9; border: 1px solid var(--border); padding: 7px 10px; font-weight: 600; }
    .report-content td { border: 1px solid var(--border); padding: 7px 10px; }
    .report-content ul { padding-left: 20px; margin: 8px 0; }
    .report-content li { margin-bottom: 4px; }

    .error-box {
      color: var(--bad);
      padding: 20px;
      background: #fee2e2;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="app-header">
    <div>
      <div class="logo">실로암장애인자립생활센터</div>
      <div class="sub">2026 생활밀착형 접근성 모니터링</div>
    </div>
    <div class="badge">v6 · OpenAI Proxy</div>
  </div>

  <div class="container">
    <div class="apikey-panel">
      <label for="proxy-endpoint">OpenAI 프록시 서버</label>
      <input type="text" id="proxy-endpoint" value="/api/report-stream" readonly>
      <button type="button" id="health-check-btn">연결 확인</button>
      <span class="apikey-status unset" id="key-status">미확인</span>
    </div>

    <div id="phase-upload">
      <div class="upload-card" id="upload-zone">
        <div class="upload-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <h2>체크리스트 XLSX 파일을 업로드하세요</h2>
        <p>체크리스트 시트 + 데일리(구청/보건소) 시트가 포함된<br>접근성 모니터링 체크리스트 파일을 올려주세요</p>
        <div class="hint">📋 접근성모니터링_체크리스트_XXXX.xlsx 형식</div>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls">
    </div>

    <div id="phase-parsed">
      <div class="phase-header">
        <button class="back-btn" type="button" id="reset-btn">← 다시 업로드</button>
        <h2 id="parsed-title">파싱 완료</h2>
      </div>
      <div id="status-area"></div>
      <div class="select-row" id="fac-tabs"></div>
      <div class="facility-grid" id="facility-detail"></div>

      <div style="background:var(--card);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:20px;">
        <h3 style="font-size:0.95rem;color:var(--navy);margin-bottom:14px;">📝 보고서 추가 정보</h3>
        <div class="meta-grid">
          <div class="meta-field"><label>조사일</label><input type="text" id="m-date" placeholder="예: 2026-04-08"></div>
          <div class="meta-field"><label>조사원</label><input type="text" id="m-surveyors" placeholder="예: 김창훈, 모상만"></div>
          <div class="meta-field"><label>소재지</label><input type="text" id="m-address" placeholder="예: 도봉구 마들로 656"></div>
          <div class="meta-field">
            <label>보고서 유형</label>
            <select id="m-level">
              <option value="formal">센터 보유용 (행정 문체)</option>
              <option value="easy">조사원 공유용 (쉬운 언어)</option>
            </select>
          </div>
        </div>
        <button class="gen-btn" id="gen-btn" type="button">📄 종합 보고서 생성</button>
      </div>
    </div>

    <div id="phase-report">
      <div class="report-toolbar">
        <button class="toolbar-btn outline" type="button" id="back-to-parsed-btn">← 돌아가기</button>
        <button class="toolbar-btn outline" type="button" id="copy-report-btn">📋 복사</button>
        <button class="toolbar-btn outline" type="button" id="download-report-btn">💾 저장</button>
        <span class="report-title-bar" id="report-title-bar"></span>
      </div>
      <div class="report-card">
        <div class="report-content" id="report-output"></div>
      </div>
    </div>
  </div>

  <script>
    let parsedFacilities = [];
    let selectedFacilityIndex = 0;
    let radarCharts = {};
    let fullReportText = '';
    let proxyReady = false;

    const RESPONSE_SCORE = {
      '적정': 2,
      '인적지원': 1,
      '부적절': 1,
      '미설치': 0,
      '미지원': 0,
      '미제공': 0,
      '해당없음': null
    };

    const DOMAINS = ['P', 'K', 'S', 'I', 'T'];
    const DOMAIN_NAMES = {
      P: '물리적 접근성',
      K: '키오스크',
      S: '서비스',
      I: '정보제공',
      T: '운영관리'
    };

    function setKeyStatus(isSet, detail) {
      const el = document.getElementById('key-status');
      el.textContent = detail;
      el.className = isSet ? 'apikey-status set' : 'apikey-status unset';
    }

    async function checkServerHealth() {
      setKeyStatus(false, '확인 중...');
      try {
        const response = await fetch('/api/health', { method: 'GET', cache: 'no-store' });
        const data = await response.json().catch(() => ({}));
        proxyReady = Boolean(response.ok && data.ok);
        setKeyStatus(proxyReady, proxyReady ? '연결됨' : (data.error || '연결 안 됨'));
      } catch (error) {
        proxyReady = false;
        setKeyStatus(false, error.message || '연결 실패');
      }
    }

    function parseDailySheet(sheet) {
      const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });
      const entries = [];

      for (let i = 1; i < data.length; i += 1) {
        const row = data[i];
        if (!row) continue;
        const num = row[0] ? String(row[0]).trim() : '';
        const fact = row[1] ? String(row[1]).trim() : '';
        const exp = row[2] ? String(row[2]).trim() : '';
        const ins = row[3] ? String(row[3]).trim() : '';
        if (fact || exp || ins) {
          entries.push({ num, fact, exp, ins });
        }
      }

      return entries;
    }

    function parseXLSX(arrayBuffer) {
      const wb = XLSX.read(arrayBuffer, { type: 'array' });
      const sheetNames = wb.SheetNames;
      const clSheet = sheetNames.find((s) => s.includes('체크리스트'));

      if (!clSheet) {
        throw new Error('체크리스트 시트를 찾을 수 없습니다.');
      }

      const clData = XLSX.utils.sheet_to_json(wb.Sheets[clSheet], { header: 1, defval: null });
      let fac1Name = '';
      let fac2Name = '';

      for (let i = 0; i < Math.min(10, clData.length); i += 1) {
        const row = clData[i];
        if (row && typeof row[3] === 'string' && row[3].trim()) {
          fac1Name = row[3].trim();
          if (typeof row[4] === 'string' && row[4].trim()) {
            fac2Name = row[4].trim();
          }
          break;
        }
      }

      if (!fac1Name) fac1Name = '시설1';

      const facilities = [];
      const facList = fac2Name
        ? [{ name: fac1Name, col: 3 }, { name: fac2Name, col: 4 }]
        : [{ name: fac1Name, col: 3 }];

      for (const { name, col } of facList) {
        const items = {};

        for (let i = 3; i < clData.length; i += 1) {
          const row = clData[i];
          if (!row) continue;

          const code = row[1] ? String(row[1]).trim() : '';
          if (!/^[PKSIT]-\d+/.test(code)) continue;

          const question = row[2] ? String(row[2]).trim() : '';
          const ans = row[col] ? String(row[col]).trim() : '';
          const nextRow = clData[i + 1];
          const reason = nextRow && !nextRow[1] && nextRow[col] ? String(nextRow[col]).trim() : '';

          items[code] = { question, ans, reason };
        }

        const scores = {};
        for (const d of DOMAINS) {
          const relevant = Object.entries(items).filter(([k]) => k.startsWith(d + '-'));
          let total = 0;
          let max = 0;

          for (const [, v] of relevant) {
            const score = RESPONSE_SCORE[v.ans];
            if (score !== null && score !== undefined) {
              total += score;
              max += 2;
            }
          }

          scores[d] = max > 0 ? Math.round((total / max) * 100) : 0;
        }

        const lower = name.toLowerCase();
        const type = lower.includes('보건소')
          ? '보건소'
          : lower.includes('병원')
            ? '병원'
            : lower.includes('구청')
              ? '구청'
              : '구청';

        const dailySheetName = sheetNames.find((s) => {
          if (type === '보건소') return s.includes('보건소');
          if (type === '구청') return s.includes('구청');
          return s.includes('데일리');
        });

        const daily = dailySheetName ? parseDailySheet(wb.Sheets[dailySheetName]) : [];
        facilities.push({ name, type, items, scores, daily });
      }

      return facilities;
    }

    function getGrade(pct) {
      if (pct >= 80) return 'A';
      if (pct >= 70) return 'B';
      if (pct >= 60) return 'C';
      if (pct >= 50) return 'D';
      return 'E';
    }

    function renderFacilities() {
      const fac = parsedFacilities[selectedFacilityIndex];
      if (!fac) return;

      document.getElementById('fac-tabs').innerHTML = parsedFacilities.map((f, i) => (
        `<button class="fac-tab${i === selectedFacilityIndex ? ' active' : ''}" type="button" data-index="${i}">${f.name}</button>`
      )).join('');

      document.querySelectorAll('.fac-tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          selectedFacilityIndex = Number(btn.dataset.index);
          renderFacilities();
        });
      });

      const detail = document.getElementById('facility-detail');
      detail.innerHTML = '';

      const overallPct = Math.round(Object.values(fac.scores).reduce((a, b) => a + b, 0) / DOMAINS.length);
      const overallGrade = getGrade(overallPct);

      const scoreCard = document.createElement('div');
      scoreCard.className = 'score-card';
      scoreCard.innerHTML = `
        <div class="card-title">영역별 점수</div>
        <div style="text-align:center;margin-bottom:14px">
          <span style="font-size:2.5rem;font-weight:700;color:var(--navy)">${overallPct}%</span>
          <span class="d-grade grade-${overallGrade}" style="font-size:1rem;padding:4px 10px;border-radius:12px;margin-left:8px">${overallGrade}</span>
          <div style="font-size:0.78rem;color:var(--muted);margin-top:2px">종합 달성률</div>
        </div>
        <div class="domain-scores">
          ${DOMAINS.map((d) => `
            <div class="domain-score">
              <div class="d-code" style="color:var(--${d})">${d}</div>
              <div class="d-pct" style="color:var(--${d})">${fac.scores[d]}%</div>
              <div class="d-grade grade-${getGrade(fac.scores[d])}">${getGrade(fac.scores[d])}</div>
              <div style="font-size:0.65rem;color:var(--muted);margin-top:2px">${DOMAIN_NAMES[d]}</div>
            </div>
          `).join('')}
        </div>
        <div class="radar-wrap"><canvas id="radar-${selectedFacilityIndex}"></canvas></div>
      `;
      detail.appendChild(scoreCard);

      const clCard = document.createElement('div');
      clCard.className = 'checklist-card';
      clCard.innerHTML = `<div class="card-title">체크리스트 응답</div>${
        DOMAINS.map((d) => {
          const items = Object.entries(fac.items).filter(([k]) => k.startsWith(d + '-'));
          if (!items.length) return '';
          return `
            <div class="cl-section">
              <div class="cl-section-title">${d} — ${DOMAIN_NAMES[d]}</div>
              ${items.map(([code, v]) => `
                <div class="cl-item">
                  <span class="cl-code">${code}</span>
                  <span class="cl-q">${v.question}</span>
                  <span class="cl-ans val-${v.ans || 'empty'}">${v.ans || '—'}</span>
                  ${v.reason ? `<span class="cl-reason">${v.reason}</span>` : ''}
                </div>
              `).join('')}
            </div>
          `;
        }).join('')
      }`;
      detail.appendChild(clCard);

      if (fac.daily && fac.daily.length > 0) {
        const dailyCard = document.createElement('div');
        dailyCard.className = 'daily-card';
        dailyCard.style.gridColumn = '1/-1';
        dailyCard.innerHTML = `<div class="card-title">데일리 경험 기록</div>${
          fac.daily.map((e) => `
            <div class="daily-entry">
              <div class="d-num">No. ${e.num}</div>
              ${e.fact ? `<div class="d-fact">📍 ${e.fact}</div>` : ''}
              ${e.exp ? `<div class="d-exp">💬 ${e.exp}</div>` : ''}
              ${e.ins ? `<div class="d-ins">💡 ${e.ins}</div>` : ''}
            </div>
          `).join('')
        }`;
        detail.appendChild(dailyCard);
      }

      setTimeout(() => {
        const ctx = document.getElementById(`radar-${selectedFacilityIndex}`);
        if (!ctx) return;
        if (radarCharts[selectedFacilityIndex]) {
          radarCharts[selectedFacilityIndex].destroy();
        }
        radarCharts[selectedFacilityIndex] = new Chart(ctx, {
          type: 'radar',
          data: {
            labels: DOMAINS.map((d) => `${d} ${DOMAIN_NAMES[d]}`),
            datasets: [{
              label: fac.name,
              data: DOMAINS.map((d) => fac.scores[d]),
              backgroundColor: 'rgba(37,99,235,0.15)',
              borderColor: '#2563eb',
              borderWidth: 2,
              pointBackgroundColor: '#2563eb'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              r: {
                min: 0,
                max: 100,
                ticks: { stepSize: 20, font: { size: 9 } },
                pointLabels: { font: { size: 9 } }
              }
            },
            plugins: { legend: { display: false } },
            animation: { duration: 500 }
          }
        });
      }, 100);
    }

    function processFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          parsedFacilities = parseXLSX(e.target.result);
          selectedFacilityIndex = 0;
          document.getElementById('phase-upload').style.display = 'none';
          document.getElementById('phase-parsed').style.display = 'block';
          document.getElementById('phase-report').style.display = 'none';
          document.getElementById('parsed-title').textContent = `${file.name} — ${parsedFacilities.length}개 시설 파싱 완료`;
          document.getElementById('status-area').innerHTML =
            `<div class="status-bar">✅ <strong>${parsedFacilities.length}개 시설</strong> 파싱 완료 — ${parsedFacilities.map((f) => `${f.name}(${f.type})`).join(', ')}</div>`;
          renderFacilities();
        } catch (err) {
          alert('파싱 오류: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function buildPrompt(fac, meta) {
      const styleGuide = meta.level === 'easy'
        ? '[보고서 언어] 조사원 공유용 — 초등 5~6학년 수준의 쉬운 말. 어려운 법령 용어 생략. 짧은 문장.'
        : '[보고서 언어] 센터 보유용 — 개조식, ~함/~됨/~임 종결. 행정·정책 문체. 법령 근거 포함. 즉시 보고서 활용 가능 수준.';

      const badItems = Object.entries(fac.items)
        .filter(([, v]) => ['부적절', '미설치', '미지원', '미제공'].includes(v.ans))
        .map(([code, v]) => `  - ${code} [${v.ans}]: ${v.question}${v.reason ? ` → ${v.reason}` : ''}`)
        .join('\n');

      const goodItems = Object.entries(fac.items)
        .filter(([, v]) => v.ans === '적정')
        .map(([code, v]) => `  - ${code}: ${v.question}`)
        .join('\n');

      const humanItems = Object.entries(fac.items)
        .filter(([, v]) => v.ans === '인적지원')
        .map(([code, v]) => `  - ${code}: ${v.question}${v.reason ? ` → ${v.reason}` : ''}`)
        .join('\n');

      const dailyText = fac.daily.length > 0
        ? fac.daily.map((e) => `[${e.num}] Fact: ${e.fact} | Experience: ${e.exp} | Insight: ${e.ins}`).join('\n')
        : '(데일리 기록 없음)';

      const overallPct = Math.round(Object.values(fac.scores).reduce((a, b) => a + b, 0) / DOMAINS.length);

      return `당신은 시각장애인 접근성 모니터링 전문 보고서 작성 AI입니다.

${styleGuide}

[조사원 특성 — 항상 전제]
- 중증 전맹 시각장애인 (중도실명), 기초 자립생활 훈련 이수
- 2021년부터 5년간 현장 활동 경력
- 몸 자체가 측정 도구 — 촉각·청각 실측 데이터
- 조사원의 경험 = 다른 방법론으로 재현 불가능한 당사자 실측 데이터
- 낯선 곳 독립 이동의 심리적 부담을 이미 안고 시설에 진입함

[4가지 증거 유형 — 절대 삭제 금지]
TYPE1 시퀀스: "~했더니 → ~해서 → 결국" 인과 흐름
TYPE2 반응: 담당자 침묵·당혹 = 시스템 부재 증거
TYPE3 직접체험: "발이 걸렸어요 / 소리가 안 났어요" = 신체 실측
TYPE4 비교: "눈 보일 때랑 다르다 / 다른 시설보다" = 중도실명 고유 판단

[시설 정보]
- 시설명: ${fac.name}
- 시설유형: ${fac.type}
- 소재지: ${meta.address}
- 조사일: ${meta.date}
- 조사원: ${meta.surveyors}
- 종합 달성률: ${overallPct}%

[영역별 점수]
${DOMAINS.map((d) => `- ${d}(${DOMAIN_NAMES[d]}): ${fac.scores[d]}% (등급: ${getGrade(fac.scores[d])})`).join('\n')}

[부적합 항목]
${badItems || '없음'}

[적정 항목]
${goodItems || '없음'}

[인적지원 항목]
${humanItems || '없음'}

[데일리 경험 기록 (Fact / Experience / Insight)]
${dailyText}

[법령 참조]
- 이동·편의시설: 장애인차별금지법 제18·19조
- 의사소통 지원: 장애인차별금지법 제21조
- 정당한 편의: 장애인차별금지법 제15조
- 시각정보 배제: 장애인차별금지법 제20조
- 교육 체계: 장애인복지법 제25조
※ 법령 불확실 시 생략 (추정 명시 금지)

[출력 형식]
다음 구조로 종합 보고서를 작성하라:

# ${fac.name} 접근성 모니터링 종합 보고서

## 1. 종합 총평
(시설이 시각장애인을 하나의 이용자로 인정하는지 전반 판단)

## 2. 영역별 분석
(P·K·S·I·T 각 영역 핵심 발견 사항)

## 3. 경험 매핑 분석
(데일리 기록의 Fact→Experience→Insight를 활용한 당사자 관점 분석)
(#에피소드 #제도제언 #감정근거 #비교판단 플래그 적극 활용)

## 4. 정책 제언
(즉각·단기·중기 개선 방향)

## 5. 종합 의견
맺음말: "우리는 시설의 수준을 평가하러 가는 것이 아닙니다. 이 공간이 시각장애인을 하나의 이용자로 인정하고 있는가를 확인합니다."`;
    }

    function renderMarkdown(el, text) {
      const safe = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      const blocks = safe.split(/\n{2,}/).map((block) => block.trim()).filter(Boolean);
      const html = blocks.map((block) => {
        if (block.startsWith('# ')) return `<h1>${block.slice(2)}</h1>`;
        if (block.startsWith('## ')) return `<h2>${block.slice(3)}</h2>`;
        if (block.startsWith('### ')) return `<h3>${block.slice(4)}</h3>`;

        const lines = block.split('\n');
        if (lines.every((line) => line.startsWith('- '))) {
          return `<ul>${lines.map((line) => `<li>${line.slice(2)}</li>`).join('')}</ul>`;
        }

        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      }).join('');

      el.innerHTML = html.replace(/(#에피소드|#제도제언|#감정근거|#비교판단)/g,
        '<span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:4px;font-size:0.82em;font-weight:700">$1</span>');
    }

    async function generateReport() {
      if (!proxyReady) {
        await checkServerHealth();
      }

      if (!proxyReady) {
        alert('OpenAI 프록시 연결 상태를 먼저 확인하세요.');
        return;
      }

      const fac = parsedFacilities[selectedFacilityIndex];
      if (!fac) {
        alert('시설을 선택하세요.');
        return;
      }

      const date = document.getElementById('m-date').value.trim() || '미기입';
      const surveyors = document.getElementById('m-surveyors').value.trim() || '미기입';
      const address = document.getElementById('m-address').value.trim() || '미기입';
      const level = document.getElementById('m-level').value;

      const btn = document.getElementById('gen-btn');
      const outputEl = document.getElementById('report-output');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>보고서 생성 중...';

      document.getElementById('phase-parsed').style.display = 'none';
      document.getElementById('phase-report').style.display = 'block';
      document.getElementById('report-title-bar').textContent = `${fac.name} 접근성 모니터링 종합 보고서`;
      outputEl.textContent = '보고서 생성 중...';
      fullReportText = '';

      try {
        const response = await fetch('/api/report-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: buildPrompt(fac, { date, surveyors, address, level })
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || data.detail || `프록시 오류: ${response.status}`);
        }

        fullReportText = data.output_text || '';
        renderMarkdown(outputEl, fullReportText || '응답이 비어 있음');
      } catch (error) {
        outputEl.innerHTML = `<div class="error-box">❌ 보고서 생성 실패: ${error.message}<br><small>/api/health, /api/report-stream 연결과 Worker 환경변수 설정 확인 필요</small></div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '📄 종합 보고서 생성';
      }
    }

    function resetToUpload() {
      document.getElementById('phase-upload').style.display = 'block';
      document.getElementById('phase-parsed').style.display = 'none';
      document.getElementById('phase-report').style.display = 'none';
      parsedFacilities = [];
      fullReportText = '';
      Object.values(radarCharts).forEach((chart) => chart.destroy());
      radarCharts = {};
      document.getElementById('file-input').value = '';
    }

    function backToParsed() {
      document.getElementById('phase-parsed').style.display = 'block';
      document.getElementById('phase-report').style.display = 'none';
      renderFacilities();
    }

    async function copyReport() {
      if (!fullReportText) return;
      await navigator.clipboard.writeText(fullReportText);
      const btn = document.getElementById('copy-report-btn');
      const original = btn.textContent;
      btn.textContent = '✓ 복사됨';
      setTimeout(() => { btn.textContent = original; }, 1500);
    }

    function downloadReport() {
      if (!fullReportText) return;
      const fac = parsedFacilities[selectedFacilityIndex];
      const filename = `${fac?.name || '보고서'}_접근성모니터링_${new Date().toISOString().slice(0, 10)}.txt`;
      const blob = new Blob([fullReportText], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('health-check-btn').addEventListener('click', checkServerHealth);
    document.getElementById('upload-zone').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', (e) => processFile(e.target.files[0]));
    document.getElementById('reset-btn').addEventListener('click', resetToUpload);
    document.getElementById('gen-btn').addEventListener('click', generateReport);
    document.getElementById('back-to-parsed-btn').addEventListener('click', backToParsed);
    document.getElementById('copy-report-btn').addEventListener('click', copyReport);
    document.getElementById('download-report-btn').addEventListener('click', downloadReport);

    const uploadZone = document.getElementById('upload-zone');
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      processFile(e.dataTransfer.files[0]);
    });

    window.addEventListener('load', checkServerHealth);
  </script>
</body>
</html>
